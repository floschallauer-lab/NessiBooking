services:
  db:
    image: postgres:16
    container_name: coursebooking-db
    environment:
      POSTGRES_DB: coursebooking_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - coursebooking_pgdata:/var/lib/postgresql/data

volumes:
  coursebooking_pgdata:
